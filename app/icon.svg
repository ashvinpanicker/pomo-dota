<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Stem -->
  <rect x="47" y="8" width="6" height="16" rx="3" fill="#2d7a2d"/>
  <!-- Leaf left -->
  <ellipse cx="37" cy="18" rx="12" ry="6" transform="rotate(-30 37 18)" fill="#3a9c3a"/>
  <!-- Leaf right -->
  <ellipse cx="63" cy="18" rx="12" ry="6" transform="rotate(30 63 18)" fill="#3a9c3a"/>
  <!-- Body shadow -->
  <circle cx="52" cy="58" r="37" fill="#c0392b" opacity="0.3"/>
  <!-- Body -->
  <circle cx="50" cy="56" r="37" fill="#e74c3c"/>
  <!-- Shine highlight -->
  <ellipse cx="38" cy="40" rx="10" ry="7" fill="#ff6b6b" opacity="0.6" transform="rotate(-20 38 40)"/>
  <!-- Shine small -->
  <ellipse cx="44" cy="36" rx="4" ry="3" fill="white" opacity="0.4" transform="rotate(-20 44 36)"/>
  <!-- Cute face - eyes -->
  <circle cx="40" cy="55" r="4" fill="#1a0000"/>
  <circle cx="60" cy="55" r="4" fill="#1a0000"/>
  <!-- Eye shine -->
  <circle cx="41.5" cy="53.5" r="1.5" fill="white"/>
  <circle cx="61.5" cy="53.5" r="1.5" fill="white"/>
  <!-- Smile -->
  <path d="M 38 65 Q 50 76 62 65" stroke="#1a0000" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="34" cy="62" r="5" fill="#ff8c8c" opacity="0.5"/>
  <circle cx="66" cy="62" r="5" fill="#ff8c8c" opacity="0.5"/>
</svg>
